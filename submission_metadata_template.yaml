# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "ChatGPT"        # e.g. for architecture discussion, code review

ai_usage_summary: |
  Briefly describe how AI tools were used. Examples:
  - "Used ChatGPT for architecture design, debugging Python code, ranking methodology discussion, Streamlit UI improvements, documentation generation, and code review. Final implementation, testing, ranking generation,and submission preparation were completed manually."

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  ApnaHire AI is a hybrid candidate ranking system designed for intelligent candidate discovery and ranking. Candidate profiles are transformed into textual representations and embedded using Sentence Transformers (all-MiniLM-L6-v2). Cosine similarity is used to measure alignment between candidate profiles and the target job description.
  Additional scoring components include experience analysis, career relevance, domain expertise, GitHub activity, recruiter engagement, and behavioral signals from the Redrob dataset. These signals are combined using a weighted hybrid scoring engine to generate a final ranking score.
  The system outputs the Top 100 candidates together with explainable reasoning while satisfying CPU-only execution constraints and reproducible ranking requirements.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: false        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
